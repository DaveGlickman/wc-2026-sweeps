name: Fetch World Cup data

on:
  schedule:
    # Every 10 minutes, offset to :03/:13/:23/... GitHub cron is UTC and
    # best-effort: scheduled runs get throttled/dropped under load, worst of all
    # at the top of the hour (:00) and the common :15/:30/:45 marks. Offsetting
    # off those busy minutes — and firing 6x/hour instead of 2 — means results
    # land within ~10 min without anyone lifting a finger. writeIfChanged keeps
    # no-op runs from creating commits, so extra runs don't spam deploys.
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:
    inputs:
      force_squads:
        description: "Rebuild public/data/players.json from ESPN squads (one request per team)"
        type: boolean
        default: false

# Prevent overlapping runs from racing on the same commit.
concurrency:
  group: fetch-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch squads (players.json)
        # Skips itself when players.json already exists, unless forced. Run the
        # workflow manually with "force_squads" ticked to (re)build it.
        env:
          WC_FORCE_SQUADS: ${{ github.event.inputs.force_squads == 'true' && '1' || '' }}
        run: node scripts/fetch-squads.js

      - name: Sync picks from the private Sheet
        # No-op until config/backend.json has an apiUrl. Pulls the token-free
        # export and rewrites config/allocations.json + config/picks.json.
        run: node scripts/sync-sheet.js

      - name: Build public roster (name + paid only)
        # Emits public/data/roster.json — the SAFE subset for the pre-season
        # sign-up tracker. Never includes tokens, teams, picks, amount or date.
        run: node scripts/build-roster.js

      - name: Fetch data
        # Runs last so its config mirror (publishConfig) picks up anything the
        # sync step just wrote. ESPN's public API needs no key — nothing secret.
        run: node scripts/fetch.js

      - name: Commit updated data
        run: |
          git config user.name "wc-sweeps-bot"
          git config user.email "actions@github.com"
          git add public/data/matches.json public/data/last-updated.txt public/data/players.json public/data/roster.json public/config config/allocations.json config/picks.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            # No [skip ci]: this push intentionally triggers the Pages deploy
            # workflow so the live site reflects the new data. fetch.yml itself
            # only runs on schedule/dispatch, so it won't re-trigger on push.
            git commit -m "data: refresh matches.json"
            git push
          fi
