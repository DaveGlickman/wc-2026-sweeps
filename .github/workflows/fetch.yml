name: Fetch World Cup data

on:
  schedule:
    # Every 30 minutes. GitHub cron is UTC and best-effort (may run late under load).
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force_squads:
        description: "Rebuild public/data/players.json from ESPN squads (one request per team)"
        type: boolean
        default: false

# Prevent overlapping runs from racing on the same commit.
concurrency:
  group: fetch-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch squads (players.json)
        # Skips itself when players.json already exists, unless forced. Run the
        # workflow manually with "force_squads" ticked to (re)build it.
        env:
          WC_FORCE_SQUADS: ${{ github.event.inputs.force_squads == 'true' && '1' || '' }}
        run: node scripts/fetch-squads.js

      - name: Sync picks from the private Sheet
        # No-op until config/backend.json has an apiUrl. Pulls the token-free
        # export and rewrites config/allocations.json + config/picks.json.
        run: node scripts/sync-sheet.js

      - name: Fetch data
        # Runs last so its config mirror (publishConfig) picks up anything the
        # sync step just wrote. ESPN's public API needs no key — nothing secret.
        run: node scripts/fetch.js

      - name: Commit updated data
        run: |
          git config user.name "wc-sweeps-bot"
          git config user.email "actions@github.com"
          git add public/data/matches.json public/data/last-updated.txt public/data/players.json public/config config/allocations.json config/picks.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            # No [skip ci]: this push intentionally triggers the Pages deploy
            # workflow so the live site reflects the new data. fetch.yml itself
            # only runs on schedule/dispatch, so it won't re-trigger on push.
            git commit -m "data: refresh matches.json"
            git push
          fi
