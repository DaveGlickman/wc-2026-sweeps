name: Deploy to GitHub Pages

# Publishes ./public to GitHub Pages. Runs on every push to main (including the
# data-refresh commits made by fetch.yml, so the live site always reflects the
# latest matches.json) and can be run manually.
#
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
# (scripts/deploy.sh does this for you via the API.)

on:
  push:
    branches: [main]
  # A workflow's GITHUB_TOKEN push does NOT trigger other workflows, so the
  # fetch.yml data-refresh commits never reached this deploy on their own —
  # the live site froze on the last human push. Redeploy whenever fetch.yml
  # finishes so fresh matches.json actually goes live.
  workflow_run:
    workflows: ["Fetch World Cup data"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Deploys fire often here — every data refresh (up to 6x/hour via fetch.yml's
# workflow_run) plus every human push. GitHub Pages allows only ONE live
# deployment per environment, so two overlapping runs race and the superseded
# one dies with "Deployment failed, try again later" (and emails a failure).
# cancel-in-progress must be FALSE for a deploy: an in-flight deployment is
# allowed to FINISH (cancelling it mid-flight is what throws "Deployment failed,
# try again later" on the superseding run and emails a failure). With false,
# GitHub still auto-cancels any older PENDING run when a newer one queues —
# silently, no email — so the running deploy completes and the latest data lands
# next. This is GitHub's own recommended Pages config.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload public/ as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
